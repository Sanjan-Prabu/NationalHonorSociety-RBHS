apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false

// JSC or Hermes (JS engine)
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    compileSdk 35 // ✅ Ensure you're using Android 15 (API level 35)
    buildToolsVersion = "34.0.0" // ✅ or whatever is installed (match with SDK Manager)

    defaultConfig {
        applicationId "com.nationalhonorsociety"
        minSdk 24 // ✅ modern minimum, avoid 21 unless you have legacy reason
        targetSdk 35 // ✅ Target Android 15
        versionCode 1
        versionName "1.0"
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures {
        dataBinding true
    }

    ndkVersion "27.1.12297006" // ✅ Match your local install
    namespace "com.nationalhonorsociety"
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation 'androidx.core:core:1.12.0'
    implementation 'com.google.firebase:firebase-analytics:22.0.0'
    implementation project(':react-native-ble-manager')
    implementation project(':react-native-image-picker')
    implementation project(':react-native-vector-icons')
    implementation project(':react-native-permissions')
    implementation 'androidx.multidex:multidex:2.0.1'

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
